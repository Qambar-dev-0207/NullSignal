<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary": "#ffffff",
              "outline-variant": "#c3c6d5",
              "on-primary-container": "#a5bdff",
              "on-secondary-fixed": "#081a3e",
              "secondary": "#4e5e85",
              "surface-dim": "#ead8b8",
              "surface-container-highest": "#f3e0c0",
              "surface-container-high": "#f9e6c5",
              "secondary-fixed-dim": "#b6c6f3",
              "outline": "#737784",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#ffeccb",
              "primary-container": "#0047ab",
              "primary-fixed": "#dae2ff",
              "on-tertiary-container": "#ffaa8a",
              "inverse-primary": "#b1c5ff",
              "secondary-container": "#c1d1ff",
              "background": "#fff8f2",
              "tertiary-fixed": "#ffdbcf",
              "surface-tint": "#2559bd",
              "secondary-fixed": "#dae2ff",
              "on-primary-fixed-variant": "#00419e",
              "primary-fixed-dim": "#b1c5ff",
              "tertiary": "#651f00",
              "tertiary-container": "#8b2e01",
              "tertiary-fixed-dim": "#ffb59a",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#ffefd4",
              "on-secondary-container": "#4a5980",
              "surface-container-low": "#fff2de",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "surface-bright": "#fff8f2",
              "surface": "#fff8f2",
              "on-surface": "#231a06",
              "on-tertiary-fixed-variant": "#802900",
              "on-primary-fixed": "#001946",
              "error-container": "#ffdad6",
              "primary": "#00327d",
              "error": "#ba1a1a",
              "on-tertiary-fixed": "#380d00",
              "on-surface-variant": "#434653",
              "on-secondary-fixed-variant": "#37466c",
              "surface-variant": "#f3e0c0",
              "on-tertiary": "#ffffff",
              "inverse-surface": "#392f19",
              "on-background": "#231a06"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .recessed-panel {
            box-shadow: inset 0 2px 4px rgba(35, 26, 6, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#fff8f2] text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#fff8f2] docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-none">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#00327d]" data-icon="signal_cellular_alt">signal_cellular_alt</span>
<span class="font-['Inter'] font-black text-xl tracking-widest text-[#231a06] uppercase">NULLSIGNAL</span>
</div>
<div class="flex items-center gap-4">
<span class="font-['Inter'] font-semibold tracking-tighter text-[1rem] uppercase text-error">EMERGENCY BROADCAST</span>
<span class="material-symbols-outlined text-[#00327d]" data-icon="battery_charging_full">battery_charging_full</span>
</div>
</div>
<div class="h-1 bg-[#fff2de]"></div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Background Texture Decor -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAVB2f_SBLsN4uVUQFSyvUNeLSGkQ3LGI7vEc4hvvrhMySvT4OZo1pkEj9DFgXz2BSiSgCyPe18jCEoa9esbnBMa5Y9S3uobF_UBUfu8JpWTwT7IJNHguiGNHhm8HDQrKU5TaVnY2nMCr19va3Q4ZyLL19pV4MmI4cIWEK80IUmLKprNuG9cd6cBdtHM-EOH_U6qOeIuHWggHrJ3gwZpg5eEnk6uigJqe-R73HJVrhmNtJnpUDMc5c8EGfaA8kG6KBKWXrxcptM6ME');"></div>
<!-- SOS Central Trigger Area -->
<div class="relative flex flex-col items-center">
<!-- Pulsing Rings -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-80 h-80 rounded-full border-4 border-error/10 animate-pulse"></div>
</div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-64 h-64 rounded-full border-2 border-error/20"></div>
</div>
<!-- Main Button -->
<button class="relative w-56 h-56 rounded-full bg-error flex flex-col items-center justify-center shadow-[0_20px_50px_rgba(186,26,26,0.3)] active:scale-95 active:opacity-90 transition-all duration-150 border-t-4 border-white/20">
<span class="text-white font-black text-7xl tracking-tighter">SOS</span>
<div class="absolute inset-0 rounded-full bg-gradient-to-br from-white/10 to-transparent"></div>
</button>
<!-- Action Label -->
<div class="mt-12 text-center space-y-2">
<p class="text-[0.6875rem] font-bold uppercase tracking-[0.3em] text-on-surface/60">HOLD TO TRANSMIT</p>
<div class="flex justify-center gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-error"></div>
<div class="w-1.5 h-1.5 rounded-full bg-error/30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-error/30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-error/30"></div>
</div>
</div>
</div>
<!-- Asymmetric Technical Status Grid -->
<div class="w-full max-w-md mt-16 grid grid-cols-2 gap-4">
<!-- Location Data -->
<div class="col-span-2 bg-surface-container-low p-4 rounded-xl border-l-4 border-primary">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface/50">Geo-coordinate Status</span>
<span class="text-sm font-semibold text-primary">Location Data Encrypted</span>
</div>
<span class="material-symbols-outlined text-primary text-xl" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<!-- Transmission Protocol -->
<div class="bg-surface-container-highest p-4 rounded-xl flex flex-col justify-between h-24">
<span class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface/50">Protocol</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="hub">hub</span>
<span class="text-sm font-bold">Network: Mesh Only</span>
</div>
</div>
<!-- Signal Strength -->
<div class="bg-surface-container-highest p-4 rounded-xl flex flex-col justify-between h-24">
<span class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface/50">Signal</span>
<div class="flex items-end justify-between">
<div class="flex gap-0.5 items-end h-6">
<div class="w-1.5 h-2 bg-on-surface/20 rounded-sm"></div>
<div class="w-1.5 h-3 bg-on-surface/20 rounded-sm"></div>
<div class="w-1.5 h-4 bg-on-surface/20 rounded-sm"></div>
<div class="w-1.5 h-6 bg-on-surface/20 rounded-sm"></div>
</div>
<span class="text-xs font-mono font-bold">OFFLINE</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#fff8f2] rounded-t-xl border-t border-[#f3e0c0] shadow-[0_-4px_20px_rgba(35,26,6,0.05)]">
<a class="flex flex-col items-center justify-center text-[#231a06]/40 hover:text-[#00327d] transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="monitor_heart">monitor_heart</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold uppercase tracking-widest mt-1">Status</span>
</a>
<!-- ACTIVE TAB: Emergency -->
<a class="flex flex-col items-center justify-center text-[#0047ab] bg-[#f3e0c0]/30 rounded-lg py-1 px-3 translate-y-[-2px] transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="sos" style="font-variation-settings: 'FILL' 1;">sos</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold uppercase tracking-widest mt-1">Emergency</span>
</a>
<a class="flex flex-col items-center justify-center text-[#231a06]/40 hover:text-[#00327d] transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="hub">hub</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold uppercase tracking-widest mt-1">Mesh</span>
</a>
<a class="flex flex-col items-center justify-center text-[#231a06]/40 hover:text-[#00327d] transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="settings_input_component">settings_input_component</span>
<span class="font-['Inter'] text-[0.6875rem] font-bold uppercase tracking-widest mt-1">Nodes</span>
</a>
</nav>
<!-- Content Padding for Bottom Nav -->
<div class="h-24"></div>
</body></html>
